<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Matrimap - Pagamento</title>

<style>
body{
font-family:Arial;
background:#0b3d91;
color:white;
text-align:center;
padding-top:100px;
}

.container{
background:white;
color:#0b3d91;
width:350px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
margin-bottom:20px;
}

.plano{
border:2px solid #0b3d91;
border-radius:10px;
padding:15px;
margin:15px 0;
}

button{
padding:12px 20px;
border:none;
border-radius:6px;
background:#0b3d91;
color:white;
font-weight:bold;
cursor:pointer;
width:100%;
margin-top:10px;
}

button:hover{
background:#062a63;
}

.voltar{
margin-top:20px;
display:block;
color:white;
}
</style>

</head>

<body>

<h1>MATRIMAP</h1>

<div class="container">

<h2>Escolha seu plano</h2>

<div class="plano">
<h3>Plano Mensal</h3>
<p>R$ 34,90 / mês</p>
<button onclick="pagarMensal()">Assinar</button>
</div>

<div class="plano">
<h3>Plano Anual</h3>
<p>R$ 349,00 / ano</p>
<button onclick="pagarAnual()">Assinar</button>
</div>

</div>

<a class="voltar" href="index.html">Voltar</a>

<script>

function pagarMensal(){
  window.location.href = "https://mpago.la/32CJkcN";
}

function pagarAnual(){
  window.location.href = "https://mpago.la/11oS7PX";
}

</script>

</body>

</html>
