<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Mapa Rural</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map{
height:100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- 🔥 DEPENDÊNCIAS CORRETAS -->
<script src="https://unpkg.com/@mapbox/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>

<script>

var map = L.map('map').setView([-22.19, -47.38], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

// 🔥 TESTE SIMPLES (GARANTIDO)
var kml = "https://developers.google.com/maps/documentation/javascript/examples/kml/westcampus.kml";

omnivore.kml(kml)
.on('ready', function(){

this.addTo(map);

map.fitBounds(this.getBounds());

})
.on('error', function(e){
console.log("ERRO KML:", e);
alert("Erro ao carregar KML");
});

</script>

</body>
</html>
