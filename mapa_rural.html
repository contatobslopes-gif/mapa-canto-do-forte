<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Mapa Rural</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;}
#map{height:100vh;}
</style>

</head>

<body>

<script>
// 🔒 PROTEÇÃO (IGUAL AO URBANO)
var logado = localStorage.getItem("logado");

if(logado !== "sim"){
alert("Você precisa fazer login");
window.location.href="index.html";
}
</script>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-22.19, -47.38], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

// 🔥 COLE SEU GEOJSON AQUI
var url = "COLE_SEU_LINK_RAW_AQUI";

fetch(url)
.then(res => res.json())
.then(function(data){

var geo = L.geoJSON(data, {

onEachFeature: function (feature, layer) {

var nome = feature.properties.nome || "Sem nome";
var matricula = feature.properties.matricula || "Não informado";
var cartorio = feature.properties.cartorio || "Não informado";
var kml = feature.properties.kml || "#";

layer.bindPopup(
"<b>"+nome+"</b><br>"+
"Matrícula: "+matricula+"<br>"+
"Cartório: "+cartorio+"<br><br>"+
"<a href='"+kml+"' target='_blank'>📥 Baixar KML</a>"
);

}

}).addTo(map);

map.fitBounds(geo.getBounds());

})
.catch(function(){
alert("Erro ao carregar mapa rural");
});

</script>

</body>
</html>
