<<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Mapa Rural</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map{
height:100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- plugin KML -->
<script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>

<script>

var map = L.map('map').setView([-22.19, -47.38], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

// 🔥 KML DE TESTE (FUNCIONA CERTO)
var kml = "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.kml";

omnivore.kml(kml)
.on('ready', function(){

this.addTo(map);

// zoom automático
map.fitBounds(this.getBounds());

});

</script>

</body>
</html>
