<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mapa - Canto do Forte</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  
var map = L.map('map', {
minZoom:3,
maxZoom:19
}).setView([-24.0055, -46.4028], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution: '© OpenStreetMap'
}).addTo(map);


var imoveis = [

{
nome: "Imóvel 001",
lat: -24.0055,
lng: -46.4028,
endereco: "Rua Exemplo, 123",
quadra: "12",
lote: "08"
},

{
nome: "Imóvel 002",
lat: -24.0035,
lng: -46.4010,
endereco: "Rua Teste, 50",
quadra: "05",
lote: "02"
}

];


imoveis.forEach(function(imovel){

var marcador = L.marker([imovel.lat, imovel.lng]).addTo(map);

marcador.bindPopup(
"<b>"+imovel.nome+"</b><br>"+
"<b>Endereço:</b> "+imovel.endereco+"<br>"+
"<b>Quadra:</b> "+imovel.quadra+"<br>"+
"<b>Lote:</b> "+imovel.lote
);

});
});

});

</body>
</html>
