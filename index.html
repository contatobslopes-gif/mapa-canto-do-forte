<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Matrimap - Login</title>

<style>

body{
font-family:Arial;
background:#0b3d91;
color:white;
text-align:center;
padding-top:150px;
}

input{
padding:10px;
margin:10px;
width:250px;
border:none;
border-radius:4px;
}

button{
padding:10px 20px;
border:none;
border-radius:4px;
background:white;
color:#0b3d91;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<img src="bemvindo.png" style="width:450px;"><br>

<h1>MATRIMAP</h1>

<p>Buscando o número da matrícula imobiliaria? Solução ágil em segundos.</p>

<input id="email" placeholder="Email"><br>

<input id="senha" type="password" placeholder="Senha"><br>

<button onclick="login()">Entrar</button>

<p>Não tem conta?</p>

<a href="cadastro.html">
<button>Criar conta</button>
</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyC-H3jvvvtlv4g3iuP7rVgr5K-R8YSjMYo",
authDomain: "matrimap-899b3.firebaseapp.com",
projectId: "matrimap-899b3",
storageBucket: "matrimap-899b3.firebasestorage.app",
messagingSenderId: "1094066148423",
appId: "1:1094066148423:web:260b14f4e2259681554d62"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

var email = document.getElementById("email").value;
var senha = document.getElementById("senha").value;

signInWithEmailAndPassword(auth, email, senha)
.then((userCredential) => {

alert("Login realizado com sucesso");

window.location.href="mapa.html";

})
.catch((error) => {

alert("Email ou senha incorretos");

});

}

</script>

</body>
</html>
