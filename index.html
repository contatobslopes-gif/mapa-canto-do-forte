authDomain: "matrimap-899b3.firebaseapp.com",
projectId: "matrimap-899b3",

messagingSenderId: "1094066148423",
appId: "1:1094066148423:web:260b14f4e2259681554d62"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

function login(){

var email = document.getElementById("email").value;

/* =========================

========================= */

if(email === "admin@matrimap.com" && senha === "@Bsl415034"){

localStorage.setItem("usuarioLogado","admin");

alert("Login administrador autorizado");

window.location.href="mapa.html";

}

/* =========================

========================= */

import("https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js")
.then(({ getAuth, signInWithEmailAndPassword }) => {

const auth = getAuth();

signInWithEmailAndPassword(auth, email, senha)
