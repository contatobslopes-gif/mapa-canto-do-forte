<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Matrimap</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b3d91;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
color:black;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px;
width:100%;
background:#0b3d91;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2>MATRIMAP</h2>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<br><br>

<button onclick="resetSenha()">Esqueci a senha</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "SUA_KEY",
authDomain: "SEU_DOMINIO",
projectId: "matrimap-899b3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

let email = document.getElementById("email").value;
let senha = document.getElementById("senha").value;

// ADMIN
if(email === "admin@matrimap.com" && senha === "@Bsl415034"){
localStorage.setItem("tipoUsuario","admin");
localStorage.setItem("logado","sim");
window.location.href="mapa.html";
return;
}

// USER
signInWithEmailAndPassword(auth,email,senha)
.then(()=>{
localStorage.setItem("tipoUsuario","usuario");
localStorage.setItem("logado","sim");

// 🔥 SIMULA PAGAMENTO (depois integra Mercado Pago)
localStorage.setItem("pagamento","ok");

window.location.href="mapa.html";
})
.catch(()=>alert("Erro login"));

}

window.resetSenha = function(){
let email = document.getElementById("email").value;
sendPasswordResetEmail(auth,email)
.then(()=>alert("Email enviado"));
}

</script>

</body>
</html>
