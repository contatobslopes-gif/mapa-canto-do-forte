<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mapa - Canto do Forte</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
  var map = L.map('map').setView([-24.0055, -46.4028], 16);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  var imovel1 = L.marker([-24.0055, -46.4028]).addTo(map);
  imovel1.bindPopup("<b>Endereço:</b> Rua Exemplo, 123<br><b>Quadra:</b> 12<br><b>Lote:</b> 08<br><br><a href='https://wa.me/5519999493684?text=Olá,%20gostaria%20de%20solicitar%20o%20número%20da%20matrícula%20deste%20imóvel.%20Endereço:%20Rua%20Exemplo%20123%20Quadra%2012%20Lote%2008' target='_blank'><button>Solicitar número da matrícula<br>📄 Retorno em até 24h</button></a>");
</script>

</body>
</html>
