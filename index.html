<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Matrimap - Login</title>

<style>

body{
font-family:Arial;
background:#0b3d91;
color:white;
text-align:center;
padding-top:150px;
}

input{
padding:10px;
margin:10px;
width:250px;
border:none;
border-radius:4px;
}

button{
padding:10px 20px;
border:none;
border-radius:4px;
background:white;
color:#0b3d91;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<h1>MATRIMAP</h1>

<p>Buscando o número da matrícula imobiliaria? Solução ágil em segundos.</p>

<input id="email" placeholder="Email"><br>

<input id="senha" type="password" placeholder="Senha"><br>

<button onclick="login()">Entrar</button>

  <p>Não tem conta?</p>

<a href="cadastro.html">
<button>Criar conta</button>
</a>
<script>

function login(){

var email = document.getElementById("email").value;
var senha = document.getElementById("senha").value;

/* LOGIN ADMIN */

if(email === "admin@matrimap.com" && senha === "@Bsl415034"){

localStorage.setItem("usuarioLogado",email);
localStorage.setItem("tipoUsuario","admin");

window.location.href="mapa.html";
return;

}

/* LOGIN USUÁRIO */

var senhaSalva = localStorage.getItem(email);

if(senhaSalva && senhaSalva === senha){

localStorage.setItem("usuarioLogado",email);
localStorage.setItem("tipoUsuario","usuario");

window.location.href="mapa.html";

}else{

alert("Email ou senha incorretos");

}

}
</script>

</body>
</html>
