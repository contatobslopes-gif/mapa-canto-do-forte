<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Matrimap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-22.19,-47.38],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTch50HxxT3Aq6udssiJ8H5RUrAsINsNQz9zpwKT6j2fS_a_7HwHCx8PnQLBeSc6KeyWkNlRXPRpPEB/pub?output=csv";

fetch(url)
.then(response => response.text())
.then(data => {

var linhas = data.split("\n");

for(var i=1;i<linhas.length;i++){

var col = linhas[i].split(",");

var lat = parseFloat(col[1]);
var lng = parseFloat(col[2]);

var cidade = col[4];
var rua = col[6];
var numero = col[7];
var matricula = col[11];

if(!isNaN(lat) && !isNaN(lng)){

L.marker([lat,lng]).addTo(map)

.bindPopup(
"<b>Matrícula:</b> "+matricula+
"<br>"+rua+", "+numero+
"<br>"+cidade
);

}

}

});

</script>

</body>
</html>
