<script>

var map = L.map('map').setView([-22.19,-47.38],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTch50HxxT3Aq6udssiJ8H5RUrAsINsNQz9zpwKT6j2fS_a_7HwHCx8PnQLBeSc6KeyWkNlRXPRpPEB/pub?output=csv";

fetch(sheetURL)
.then(response => response.text())
.then(data => {

var linhas = data.split("\n");

var cabecalho = linhas[0].split(",");

var latIndex = cabecalho.indexOf("lat");
var lngIndex = cabecalho.indexOf("lng");
var cidadeIndex = cabecalho.indexOf("cidade");
var ruaIndex = cabecalho.indexOf("rua");
var numeroIndex = cabecalho.indexOf("numero");
var matriculaIndex = cabecalho.indexOf("matricula");

for(var i=1;i<linhas.length;i++){

var colunas = linhas[i].split(",");

var lat = parseFloat(colunas[latIndex]);
var lng = parseFloat(colunas[lngIndex]);

var cidade = colunas[cidadeIndex];
var rua = colunas[ruaIndex];
var numero = colunas[numeroIndex];
var matricula = colunas[matriculaIndex];

if(!isNaN(lat) && !isNaN(lng)){

L.marker([lat,lng])
.addTo(map)
.bindPopup(
"<b>Matrícula:</b> "+matricula+
"<br><b>Endereço:</b> "+rua+", "+numero+
"<br><b>Cidade:</b> "+cidade
);

}

}

});

</script>
