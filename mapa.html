<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Matrimap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;}
#map{height:100vh;width:100%;}

#buscaBox{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
z-index:1000;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<script>
if(!localStorage.getItem("usuarioLogado")){
  alert("Faça login");
  window.location.href="index.html";
}

var tipoUsuario = localStorage.getItem("tipoUsuario");
</script>

<div id="buscaBox">
<input id="busca" placeholder="Buscar endereço">
<button onclick="buscar()">Buscar</button>
</div>

<!-- 🔒 AGORA SÓ ADMIN VÊ -->
<div id="adminTools" style="position:absolute;top:60px;right:10px;z-index:1000;display:none;">
  <button onclick="backup()">💾 Backup</button><br><br>
  <input type="file" onchange="restore(event)">
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// MOSTRAR FERRAMENTAS ADMIN
window.onload = function(){
  if(tipoUsuario === "admin"){
    document.getElementById("adminTools").style.display = "block";
  }
};

// =========================
// FUNÇÕES SEGURAS
// =========================

function obterDados(){
  try{
    return JSON.parse(localStorage.getItem("dados")) || [];
  }catch(e){
    return [];
  }
}

function salvarDados(dados){
  localStorage.setItem("dados", JSON.stringify(dados));
}

// =========================
// MAPA
// =========================

var mapa = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:22}
);

var satelite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:22}
);

var rotulos = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:22,opacity:0.5}
);

var map = L.map('map',{
center:[-22.19,-47.38],
zoom:13,
layers:[mapa]
});

L.control.layers({
"Mapa": mapa,
"Satélite": L.layerGroup([satelite,rotulos])
}).addTo(map);

// =========================
// FORMATAÇÃO
// =========================

function formatarEndereco(texto){
return texto.toLowerCase().replace(/\b\w/g,l=>l.toUpperCase());
}

// =========================
// BUSCA
// =========================

function buscar(){

var termo = document.getElementById("busca").value;

fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(termo))
.then(r=>r.json())
.then(function(data){

if(data.length==0){
alert("Não encontrado");
return;
}

var lat = parseFloat(data[0].lat);
var lon = parseFloat(data[0].lon);
var endereco = formatarEndereco(termo);

map.setView([lat,lon],19);

// 🔥 ALTERAÇÃO 1: marker arrastável
var marker = L.marker([lat,lon], {draggable:true}).addTo(map);

marker.on("click", function(){

if(tipoUsuario !== "admin"){
alert("Apenas administrador pode salvar");
return;
}

var matricula = prompt("Digite a matrícula:");
if(!matricula) return;

var cartorio = prompt("Digite o cartório:");
if(!cartorio) return;

// 🔥 ALTERAÇÃO 2: pegar posição ajustada
var pos = marker.getLatLng();

var dados = obterDados();

dados.push({
lat:pos.lat,
lon:pos.lng,
endereco:endereco,
matricula:matricula,
cartorio:cartorio
});

salvarDados(dados);

alert("Salvo!");

carregarSalvos();

});

marker.bindPopup("<b>"+endereco+"</b><br>Arraste o ponto e clique para cadastrar").openPopup();

});

}

// =========================
// CARREGAR
// =========================

var camadaSalvos = L.layerGroup().addTo(map);

function carregarSalvos(){

camadaSalvos.clearLayers();

var dados = obterDados();

dados.forEach(function(d, index){

var marker = L.circleMarker([d.lat,d.lon],{
radius:6,
color:"green",
fillOpacity:0.7
}).addTo(camadaSalvos);

marker.bindPopup(
"<b>Endereço:</b> "+d.endereco+
"<br><b>Matrícula:</b> "+d.matricula+
"<br><b>Cartório:</b> "+d.cartorio+
(tipoUsuario === "admin" ?
"<br><br><button onclick='editarImovel("+index+")'>✏️ Editar</button>"
: "")
);

});

}

carregarSalvos();

// =========================
// EDITAR
// =========================

function editarImovel(index){

var dados = obterDados();

var novaMatricula = prompt("Editar matrícula:", dados[index].matricula);
if(!novaMatricula) return;

var novoCartorio = prompt("Editar cartório:", dados[index].cartorio);
if(!novoCartorio) return;

dados[index].matricula = novaMatricula;
dados[index].cartorio = novoCartorio;

salvarDados(dados);

alert("Atualizado!");

carregarSalvos();

}

// =========================
// BACKUP
// =========================

function backup(){
const dados = localStorage.getItem("dados") || "[]";

const blob = new Blob([dados], {type:"application/json"});
const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = "backup_matrimap.json";
a.click();
}

// =========================
// RESTORE
// =========================

function restore(event){

const file = event.target.files[0];
const reader = new FileReader();

reader.onload = function(e){
  localStorage.setItem("dados", e.target.result);
  alert("Backup restaurado!");
  carregarSalvos();
};

reader.readAsText(file);
}

// =========================
// OSM
// =========================

var camadaOSM = L.layerGroup().addTo(map);

function carregarOSM(){

var b = map.getBounds();

var url = "https://overpass-api.de/api/interpreter?data=[out:json];(way[\"building\"]("+b.getSouth()+","+b.getWest()+","+b.getNorth()+","+b.getEast()+"););out center;";

fetch(url)
.then(r=>r.json())
.then(function(data){

camadaOSM.clearLayers();

data.elements.forEach(function(e){

if(!e.center) return;

L.circleMarker([e.center.lat,e.center.lon],{
radius:4,
color:"red",
fillOpacity:0.5
}).addTo(camadaOSM);

});

});

}

carregarOSM();
map.on("moveend",carregarOSM);

</script>

</body>
</html>
