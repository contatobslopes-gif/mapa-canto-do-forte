<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Matrimap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;}
#map{height:100vh;}

#buscaBox{
position:absolute;
top:10px;
left:10px;
z-index:1000;
background:white;
padding:10px;
border-radius:8px;
}

#legenda{
position:absolute;
bottom:20px;
left:10px;
background:white;
padding:10px;
border-radius:8px;
z-index:1000;
}
</style>
</head>

<body>

<script>
// BLOQUEIOS
if(!localStorage.getItem("logado")){
alert("Faça login");
window.location.href="index.html";
}

if(localStorage.getItem("tipoUsuario") !== "admin"){
if(localStorage.getItem("pagamento") !== "ok"){
alert("Pagamento necessário");
window.location.href="index.html";
}
}
</script>

<div id="buscaBox">
<input id="busca" placeholder="Buscar endereço">
<button onclick="buscar()">Buscar</button>
</div>

<div id="legenda">
🔴 Sem matrícula<br>
🟢 Com matrícula<br>
🟡 Não localizada
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// 🔥 MAPTILER
var streets = L.tileLayer(
'https://api.maptiler.com/maps/streets/{z}/{x}/{y}.png?key=SUA_KEY',
{tileSize:512,zoomOffset:-1}
);

var hybrid = L.tileLayer(
'https://api.maptiler.com/maps/hybrid/{z}/{x}/{y}.jpg?key=SUA_KEY',
{tileSize:512,zoomOffset:-1}
);

var osm = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
);

var map = L.map('map',{
center:[-22.19,-47.38],
zoom:13,
layers:[osm]
});

L.control.layers({
"OSM": osm,
"Ruas": streets,
"Híbrido": hybrid
}).addTo(map);

// 🔥 CARREGAR CSV DO GITHUB
fetch("SEU_LINK_RAW_CSV")
.then(r=>r.text())
.then(text=>{

let linhas = text.split("\n");

linhas.forEach(async (l,i)=>{

if(i===0) return;

let col = l.split(",");

let endereco = col[0];
let matricula = col[1];
let cartorio = col[2];

// GEOCODING
let geo = await fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(endereco));
let data = await geo.json();

if(data.length === 0) return;

let lat = parseFloat(data[0].lat);
let lon = parseFloat(data[0].lon);

// COR
let cor = "red";
if(matricula) cor = "green";

let marker = L.circleMarker([lat,lon],{
radius:6,
color:cor
}).addTo(map);

marker.bindPopup(
"<b>"+endereco+"</b><br>"+
"Matrícula: "+matricula+"<br>"+
"Cartório: "+cartorio
);

// ADMIN ARRASTAR
if(localStorage.getItem("tipoUsuario")==="admin"){

let m = L.marker([lat,lon],{draggable:true}).addTo(map);

m.on("dragend",function(){
let pos = m.getLatLng();
console.log("Nova posição:",pos);
});

}

});

});

// BUSCA
function buscar(){

let termo = document.getElementById("busca").value;

fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(termo))
.then(r=>r.json())
.then(data=>{

if(data.length==0) return;

let lat = data[0].lat;
let lon = data[0].lon;

map.setView([lat,lon],19);

});

}

</script>

</body>
</html>

</body>
</html>
