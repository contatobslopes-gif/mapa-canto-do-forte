<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Matrimap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;}
#map{height:100vh;width:100%;}

/* 🔍 BUSCA */
#buscaBox{
position:absolute;top:10px;left:50%;
transform:translateX(-50%);
z-index:1000;background:white;padding:10px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
}

/* 📊 LEGENDA */
#legenda{
position:absolute;
bottom:20px;
left:20px;
z-index:1000;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
font-size:14px;
}

.itemLegenda{
margin-bottom:5px;
}

.cor{
display:inline-block;
width:12px;
height:12px;
margin-right:5px;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("logado")!=="sim"){
alert("Faça login");
window.location.href="index.html";
}

var tipoUsuario = localStorage.getItem("tipoUsuario");
</script>

<!-- BUSCA -->
<div id="buscaBox">
<input id="busca" placeholder="Buscar endereço">
<button onclick="buscar()">Buscar</button>
</div>

<!-- LEGENDA -->
<div id="legenda">
<div class="itemLegenda"><span class="cor" style="background:red"></span>Sem matrícula</div>
<div class="itemLegenda"><span class="cor" style="background:yellow"></span>Dados parciais</div>
<div class="itemLegenda"><span class="cor" style="background:green"></span>Com matrícula</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// MAPAS
var mapa = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:22});

var satelite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:22}
);

var rotulos = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:22,opacity:0.5}
);

var map = L.map('map',{
center:[-22.19,-47.38],
zoom:13,
layers:[mapa]
});

L.control.layers({
"Mapa": mapa,
"Satélite": L.layerGroup([satelite,rotulos])
}).addTo(map);

// PADRONIZAR ENDEREÇO
function formatarEndereco(texto){
return texto
.toLowerCase()
.replace(/\b\w/g, l => l.toUpperCase());
}

// BUSCAR
function buscar(){

var termo = document.getElementById("busca").value;

fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(termo))
.then(r=>r.json())
.then(function(data){

if(data.length==0){
alert("Não encontrado");
return;
}

var lat = parseFloat(data[0].lat);
var lon = parseFloat(data[0].lon);

var endereco = formatarEndereco(termo);

map.setView([lat,lon],19);

var marker = L.marker([lat,lon]).addTo(map);

marker.on("click", function(){

if(tipoUsuario !== "admin"){
alert("Apenas administrador pode salvar");
return;
}

// matrícula
var matricula = prompt("Digite a matrícula:");
if(!matricula) return;

// cartório
var cartorio = prompt("Digite o cartório:");
if(!cartorio) return;

var dados = JSON.parse(localStorage.getItem("dados")||"[]");

dados.push({
lat:lat,
lon:lon,
endereco:endereco,
matricula:matricula,
cartorio:cartorio,
status:"verde"
});

localStorage.setItem("dados",JSON.stringify(dados));

alert("Salvo!");

carregarSalvos();

});

marker.bindPopup("<b>"+endereco+"</b><br>Clique para cadastrar").openPopup();

});

}

// CARREGAR SALVOS
function carregarSalvos(){

var dados = JSON.parse(localStorage.getItem("dados")||"[]");

dados.forEach(function(d){

var cor = "green";

var marker = L.circleMarker([d.lat,d.lon],{
radius:6,
color:cor,
fillOpacity:0.7
}).addTo(map);

marker.bindPopup(
"<b>Matrícula:</b> "+d.matricula+
"<br>"+d.endereco+
"<br><b>Cartório:</b> "+
"<a href='https://www.google.com/search?q="+d.cartorio+" cartorio registro de imoveis site:cnj.jus.br' target='_blank'>"+d.cartorio+"</a>"
);

});

}

carregarSalvos();

// IMÓVEIS AUTOMÁTICOS
var camadaOSM = L.layerGroup().addTo(map);

function carregarOSM(){

var b = map.getBounds();

var url = "https://overpass-api.de/api/interpreter?data=[out:json];(way[\"building\"]("+b.getSouth()+","+b.getWest()+","+b.getNorth()+","+b.getEast()+"););out center;";

fetch(url)
.then(r=>r.json())
.then(function(data){

camadaOSM.clearLayers();

data.elements.forEach(function(e){

if(!e.center) return;

L.circleMarker([e.center.lat,e.center.lon],{
radius:4,
color:"red",
fillOpacity:0.5
}).addTo(camadaOSM);

});

});

}

carregarOSM();
map.on("moveend",carregarOSM);

</script>

</body>
</html>
