<style>
:root{
  --azul:#0b3d91;
  --azul-escuro:#082c68;

*{box-sizing:border-box}
html,body{height:100%}
body{

  background:#eef3fb;
  color:var(--texto);
}
.admin-bar{

  top:12px;
  left:50%;
  transform:translateX(-50%);

  display:none;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  width:min(96vw, 980px);
  padding:12px;
  background:rgba(255,255,255,.96);
  border:1px solid #d7e5ff;
  border-radius:18px;
  box-shadow:0 18px 40px rgba(0,0,0,.14);

}
.admin-bar.show{display:flex}
.admin-tag{
  padding:8px 12px;
  border-radius:999px;
  background:#eef4ff;
  color:var(--azul);
  font-size:12px;
  font-weight:700;
}
.admin-nav-btn{
  border:none;
  border-radius:12px;
  padding:10px 12px;
  cursor:pointer;
  font-size:13px;
  font-weight:700;
  background:#eef4ff;
  color:var(--azul);
}
.admin-nav-btn.primary{
  background:var(--azul);
  color:#fff;
}

.app{
  display:grid;
  grid-template-columns:340px 1fr;
  grid-template-rows:70px calc(100vh - 70px);

    "sidebar map";
}
.topbar{

.top-actions{

.top-btn{

label{

}
input, select{

}
input:focus, select:focus{

.btn{

function isExpired(vencimento){
  if(!vencimento) return true;
  return new Date(vencimento).getTime() < Date.now();
}

async function validarAcesso(user){
  if(localStorage.getItem("tipoUsuario") === "admin"){
    document.getElementById("userName").textContent = "Administrador";
    return true;
  }

  if(!user){
    window.location.href = "index.html";
    return false;
  }

  const snap = await get(ref(db, "usuarios/" + user.uid));
  if(!snap.exists()){
    window.location.href = "pagamento.html";
    return false;
  }

  const dados = snap.val();
  document.getElementById("userName").textContent = dados.nome || "Usuário";

  const vencimento = dados.vencimento || "";
  const status = dados.status || "pendente_pagamento";

  if(status !== "ativo" || isExpired(vencimento)){
    if(status === "ativo" && isExpired(vencimento)){
      await update(ref(db, "usuarios/" + user.uid), {
        status: "pendente_pagamento"
      });
    }
    window.location.href = "pagamento.html";
    return false;
  }

  return true;
}

const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{ maxZoom:22 });
const streets = L.tileLayer("https://api.maptiler.com/maps/streets/{z}/{x}/{y}.png?key=" + MAPTILER_KEY,{ tileSize:512, zoomOffset:-1, maxZoom:22 });
const hybrid = L.tileLayer("https://api.maptiler.com/maps/hybrid/{z}/{x}/{y}.jpg?key=" + MAPTILER_KEY,{ tileSize:512, zoomOffset:-1, maxZoom:22 });

  zoom:13,
  layers:[streets]
});

L.control.layers({
  "Ruas": streets,
  "Satélite": hybrid,
  "Mapa alternativo": osm
}).addTo(map);

let markerLayer = L.layerGroup().addTo(map);
let currentSearchMarker = null;
let ruralSigefLayer = L.geoJSON(null);
let ruralCarLayer = L.geoJSON(null);
let ruralFeatures = [];
let selectedRuralFeature = null;
let selectedRuralLayer = null;
let ruralLoadedOnce = false;

function limparTexto(v){
  return (v || "").toString().trim();
}

function primeiraValida(...valores){
  return valores.find(v => limparTexto(v));
}

function extrairCidade(address = {}){
  return primeiraValida(address.city, address.town, address.village, address.municipality, address.city_district);
}

function montarEnderecoCurto(address = {}){
  const rua = primeiraValida(address.road, address.pedestrian, address.footway, address.cycleway, address.path, address.residential);
  const bairro = primeiraValida(address.suburb, address.neighbourhood, address.quarter, address.city_district);
  const cidade = extrairCidade(address);

  return {
    rua: rua || "",
    bairro: bairro || "",
    cidade: cidade || ""
  };
}

function montarHtmlPopupCurto(address = {}, matricula = "", cartorio = "", endereco = ""){
  const enderecoFinal = endereco || "Não informado";

  return `
    <div class="popup-short">
      <div><b>Endereço:</b> ${enderecoFinal}</div>
      <div><b>Matrícula:</b> ${matricula || "-"}</div>
      <div><b>Cartório:</b> ${cartorio || "-"}</div>
    </div>
  `;
}

function normalizarTexto(s){
  return limparTexto(s)
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase();
}

function extrairLatLngDaCoordenada(coordenada){
  const texto = limparTexto(coordenada);
  if(!texto) return null;

  const partes = texto.split("|");
  if(partes.length !== 2) return null;

  const lat = parseFloat(partes[0].trim().replace(",", "."));
  const lng = parseFloat(partes[1].trim().replace(",", "."));

  if(isNaN(lat) || isNaN(lng)) return null;
  if(Math.abs(lat) > 90 || Math.abs(lng) > 180) return null;

  return { lat, lng };
}

function preencherListaCidades(cidades){
  listaCidades.innerHTML = "";
  cidades.forEach(nome => {
    const option = document.createElement("option");
    option.value = nome;
    listaCidades.appendChild(option);
  });
}

async function carregarCidadesDoEstado(uf){
  cidadeInput.value = "";
  cidadesDoEstado = [];
  preencherListaCidades([]);

  if(!uf) return;

  try{
    const url = `https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`;
    const resposta = await fetch(url);
    const dados = await resposta.json();

    cidadesDoEstado = dados
      .map(item => item.nome)
      .filter(Boolean)
      .sort((a,b) => a.localeCompare(b, "pt-BR"));

    preencherListaCidades(cidadesDoEstado);
  }catch(error){
    console.log("Erro ao carregar cidades:", error);
  }
}

estadoSelect.addEventListener("change", async () => {
  await carregarCidadesDoEstado(estadoSelect.value);
});

cidadeInput.addEventListener("input", () => {
  const termo = normalizarTexto(cidadeInput.value);
  if(!termo){
    preencherListaCidades(cidadesDoEstado);
    return;
  }

  const filtradas = cidadesDoEstado.filter(nome =>
    normalizarTexto(nome).includes(termo)
  );
  preencherListaCidades(filtradas);
});

async function carregarPontos(){
  try{
    markerLayer.clearLayers();

    Papa.parse(CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(resultado){
        const linhas = resultado.data || [];

        linhas.forEach((linha) => {
          const endereco = limparTexto(
            linha.endereco ||
            linha.Endereco ||
            linha.ENDERECO ||
            linha["endereço"] ||
            linha["Endereço"] ||
            linha["ENDEREÇO"]
          );

          const matricula = limparTexto(
            linha.matricula ||
            linha.Matricula ||
            linha.MATRICULA
          );

          const cartorio = limparTexto(
            linha.cartorio ||
            linha.Cartorio ||
            linha.CARTORIO
          );

          const coordenada = limparTexto(
            linha.coordenada ||
            linha.Coordenada ||
            linha.COORDENADA
          );

          let posicao = null;

          const latTexto = limparTexto(
            linha.lat ||
            linha.Lat ||
            linha.LAT
          );

          const lngTexto = limparTexto(
            linha.lng ||
            linha.Lng ||
            linha.LNG
          );

          const lat = parseFloat(latTexto.replace(",", "."));
          const lng = parseFloat(lngTexto.replace(",", "."));

          if (!isNaN(lat) && !isNaN(lng) && Math.abs(lat) <= 90 && Math.abs(lng) <= 180) {
            posicao = { lat, lng };
          }

          if (!posicao && coordenada) {
            posicao = extrairLatLngDaCoordenada(coordenada);
          }

          if(!posicao) return;

          const isAdmin = localStorage.getItem("tipoUsuario") === "admin";

          const marker = L.marker([posicao.lat, posicao.lng], {
            draggable: isAdmin
          }).addTo(markerLayer);

          marker.bindPopup(
            montarHtmlPopupCurto(
              {},
              matricula,
              cartorio,
              endereco
            )
          );

          if(isAdmin){
            marker.on("dragend", function(e){
              console.log("Nova posição:", e.target.getLatLng());
            });
          }
        });
      },
      error: function(error){
        console.log("Erro ao carregar CSV:", error);
      }
    });
  }catch(error){
    console.log("Erro ao carregar CSV:", error);
  }
}

function montarTentativasBusca(){
  const tipo = limparTexto(document.getElementById("tipoLogradouro").value);
  const rua = limparTexto(document.getElementById("rua").value);
  const numero = limparTexto(document.getElementById("numero").value);
  const bairro = limparTexto(document.getElementById("bairro").value);
  const cidade = limparTexto(document.getElementById("cidade").value);
  const estado = limparTexto(document.getElementById("estado").value);

  const tentativas = [];

  if(rua && numero && cidade && estado){
    tentativas.push([tipo, rua, numero, bairro, cidade, estado, "Brasil"].filter(Boolean).join(", "));
  }

  if(rua && cidade && estado){
    tentativas.push([tipo, rua, bairro, cidade, estado, "Brasil"].filter(Boolean).join(", "));
  }

  if(rua && cidade){
    tentativas.push([tipo, rua, bairro, cidade, "Brasil"].filter(Boolean).join(", "));
  }

  if(rua && estado){
    tentativas.push([tipo, rua, bairro, estado, "Brasil"].filter(Boolean).join(", "));
  }

  if(rua){
    tentativas.push([tipo, rua, bairro, "Brasil"].filter(Boolean).join(", "));
    tentativas.push(rua);
  }

  return [...new Set(tentativas)];
}

async function buscarNoNominatim(termo){
  const url = "https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=10&q=" + encodeURIComponent(termo);
  const r = await fetch(url);
  return await r.json();
}

window.buscar = async function(){
  const results = document.getElementById("results");
  results.innerHTML = "";

  const rua = limparTexto(document.getElementById("rua").value);
  if(!rua){
    results.innerHTML = `<div class="result-item">Digite pelo menos parte do nome da rua.</div>`;
    return;
  }

  const tentativas = montarTentativasBusca();
  let data = [];

  for(const termo of tentativas){
    try{
      const resposta = await buscarNoNominatim(termo);
      if(resposta && resposta.length){
        data = resposta;
        break;
      }
    }catch(e){}
  }

  if(!data.length){
    results.innerHTML = `<div class="result-item">Nenhum resultado encontrado. Tente buscar apenas pela rua, ou rua + cidade.</div>`;
    return;
  }

  data.forEach(item => {
    const curto = montarEnderecoCurto(item.address || {});
    const titulo = curto.rua || "Endereço encontrado";
    const subtitulo = [curto.bairro, curto.cidade].filter(Boolean).join(" • ");

    const div = document.createElement("div");
    div.className = "result-item";
    div.innerHTML = `
      <div class="result-title">${titulo}</div>
      <div class="result-sub">${subtitulo || "Sem bairro/cidade informados"}</div>
    `;

    div.onclick = () => {
      const lat = parseFloat(item.lat);
      const lon = parseFloat(item.lon);

      map.setView([lat, lon], 19);

      if(currentSearchMarker){
        map.removeLayer(currentSearchMarker);
      }

      currentSearchMarker = L.marker([lat, lon]).addTo(map);
      currentSearchMarker.bindPopup(montarHtmlPopupCurto(item.address || {}, "", "", titulo)).openPopup();
    };

    results.appendChild(div);
  });
};

function escapeXml(str){
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&apos;");
}

function obterNomeRural(props = {}){
  return limparTexto(
    props.nome ||
    props.nome_area ||
    props.denominaca ||
    props.denominacao ||
    props.imovel ||
    props.area_imovel
  ) || "Imóvel rural";
}

function obterMatriculaOuCAR(props = {}){
  return limparTexto(
    props.matricula ||
    props.registro_m ||
    props.car ||
    props.cod_imovel ||
    props.cod_immov ||
    props.ccir ||
    props.codigo
  ) || "-";
}

function obterMunicipioRural(props = {}){
  return limparTexto(
    props.municipio ||
    props.municipio_ ||
    props.município
  ) || "-";
}

function obterAreaRural(props = {}){
  const valor = limparTexto(
    props.area_ha ||
    props.area ||
    props.area_imovel ||
    props.hectares ||
    props.num_area
  );
  return valor || "-";
}

function formatarValorAreaRural(valor){
  if(!valor || valor === "-") return "-";
  const numero = Number(String(valor).replace(",", "."));
  if(Number.isNaN(numero)) return valor;
  return numero.toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " ha";
}

function sanitizarNomeArquivo(nome){
  return limparTexto(nome)
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-zA-Z0-9_-]+/g, "_")
    .replace(/^_+|_+$/g, "")
    .toLowerCase() || "imovel_rural";
}

function geometryToKml(geometry){
  if(!geometry || !geometry.type || !geometry.coordinates) return "";

  const coordsToString = (ring) => ring.map(coord => {
    const lng = coord[0];
    const lat = coord[1];
    const alt = coord[2] || 0;
    return `${lng},${lat},${alt}`;
  }).join(" ");

  const polygonToKml = (polygonCoords) => {
    if(!polygonCoords || !polygonCoords.length) return "";
    const outer = polygonCoords[0] || [];
    const inners = polygonCoords.slice(1);

    let kml = `
      <Polygon>
        <outerBoundaryIs>
          <LinearRing>
            <coordinates>${coordsToString(outer)}</coordinates>
          </LinearRing>
        </outerBoundaryIs>
    `;

    inners.forEach(inner => {
      kml += `
        <innerBoundaryIs>
          <LinearRing>
            <coordinates>${coordsToString(inner)}</coordinates>
          </LinearRing>
        </innerBoundaryIs>
      `;
    });

    kml += `</Polygon>`;
    return kml;
  };

  if(geometry.type === "Polygon"){
    return polygonToKml(geometry.coordinates);
  }

  if(geometry.type === "MultiPolygon"){
    return geometry.coordinates.map(polygonToKml).join("");
  }

  return "";
}

function featureToKml(feature){
  const props = feature.properties || {};
  const nome = obterNomeRural(props);
  const matriculaOuCar = obterMatriculaOuCAR(props);
  const municipio = obterMunicipioRural(props);
  const area = formatarValorAreaRural(obterAreaRural(props));
  const geometryKml = geometryToKml(feature.geometry);

  return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <name>${escapeXml(nome)}</name>
    <Placemark>
      <name>${escapeXml(nome)}</name>
      <description><![CDATA[
        <b>Matrícula / CAR:</b> ${escapeXml(matriculaOuCar)}<br>
        <b>Município:</b> ${escapeXml(municipio)}<br>
        <b>Área:</b> ${escapeXml(area)}
      ]]></description>
      ${geometryKml}
    </Placemark>
  </Document>
</kml>`;
}

function baixarTextoComoArquivo(conteudo, nomeArquivo, tipo){
  const blob = new Blob([conteudo], { type: tipo });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = nomeArquivo;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function estiloRural(base = "sigef"){
  if(base === "car"){
    return {
      color: "#0f766e",
      weight: 1.2,
      fillColor: "#14b8a6",
      fillOpacity: 0.18
    };
  }

  return {
    color: "#0b3d91",
    weight: 1.2,
    fillColor: "#3b82f6",
    fillOpacity: 0.14
  };
}

function destacarRural(layer){
  layer.setStyle({
    weight: 2.5,
    fillOpacity: 0.28
  });
  if(!L.Browser.ie && !L.Browser.opera && !L.Browser.edge){
    layer.bringToFront();
  }
}

function resetarRural(layer){
  if(!layer || !layer.feature) return;
  const base = layer.feature.properties?._baseTipo || "sigef";
  layer.setStyle(estiloRural(base));
}

function montarPopupRural(feature){
  const props = feature.properties || {};
  const nome = obterNomeRural(props);
  const matriculaOuCar = obterMatriculaOuCAR(props);
  const municipio = obterMunicipioRural(props);
  const area = formatarValorAreaRural(obterAreaRural(props));
  const rid = props._rid || "";

  return `
    <div class="popup-rural">
      <div class="titulo">${nome}</div>
      <div class="linha"><b>Matrícula / CAR:</b> ${matriculaOuCar}</div>
      <div class="linha"><b>Município:</b> ${municipio}</div>
      <div class="linha"><b>Área:</b> ${area}</div>
      <button class="popup-btn" onclick="baixarKMLPorId('${rid}')">Baixar KML</button>
    </div>
  `;
}

function atualizarSelectCidadesRurais(){
  const uf = ruralEstadoSelect.value;
  const cidades = Object.keys(RURAL_INDEX[uf] || {});
  ruralCidadeSelect.innerHTML = "";

  cidades.forEach(cidade => {
    const option = document.createElement("option");
    option.value = cidade;
    option.textContent = cidade;
    ruralCidadeSelect.appendChild(option);
  });

  if(!cidades.length){
    const option = document.createElement("option");
    option.value = "";
    option.textContent = "Sem cidades";
    ruralCidadeSelect.appendChild(option);
  }
}

ruralEstadoSelect.addEventListener("change", () => {
  atualizarSelectCidadesRurais();
  carregarRural();
});

ruralCidadeSelect.addEventListener("change", () => {
  carregarRural();
});

async function carregarGeoJsonRural(arquivo, baseTipo){
  if(!arquivo) return [];

  const resposta = await fetch(arquivo);
  if(!resposta.ok){
    throw new Error("Não foi possível carregar " + arquivo);
  }

  const geojson = await resposta.json();
  const features = Array.isArray(geojson.features) ? geojson.features : [];

  return features.map((feature, index) => {
    if(!feature.properties) feature.properties = {};
    feature.properties._baseTipo = baseTipo;
    feature.properties._rid = `${baseTipo}_${Date.now()}_${index}_${Math.random().toString(36).slice(2, 8)}`;
    return feature;
  });
}

async function carregarRural(){
  const uf = ruralEstadoSelect.value;
  const cidade = ruralCidadeSelect.value;
  const config = RURAL_INDEX[uf]?.[cidade];

  ruralResults.innerHTML = "";
  ruralStatus.textContent = "Carregando base rural...";

  ruralSigefLayer.clearLayers();
  ruralCarLayer.clearLayers();

  if(map.hasLayer(ruralSigefLayer)) map.removeLayer(ruralSigefLayer);
  if(map.hasLayer(ruralCarLayer)) map.removeLayer(ruralCarLayer);

  ruralFeatures = [];
  selectedRuralFeature = null;
  selectedRuralLayer = null;

  if(!config){
    ruralStatus.textContent = "Nenhuma base rural cadastrada para esta cidade.";
    return;
  }

  try{
    const sigefFeatures = await carregarGeoJsonRural(config.sigef, "sigef");
    const carFeatures = config.car ? await carregarGeoJsonRural(config.car, "car") : [];

    ruralFeatures = [...sigefFeatures, ...carFeatures];

    ruralSigefLayer = L.geoJSON(sigefFeatures, {
      style: () => estiloRural("sigef"),
      onEachFeature: (feature, layer) => {
        layer.bindPopup(montarPopupRural(feature));

        layer.on("click", () => {
          selectedRuralFeature = feature;
          selectedRuralLayer = layer;
          destacarRural(layer);
        });

        layer.on("mouseover", () => destacarRural(layer));
        layer.on("mouseout", () => {
          if(selectedRuralLayer !== layer){
            resetarRural(layer);
          }
        });
      }
    }).addTo(map);

    ruralCarLayer = L.geoJSON(carFeatures, {
      style: () => estiloRural("car"),
      onEachFeature: (feature, layer) => {
        layer.bindPopup(montarPopupRural(feature));

        layer.on("click", () => {
          selectedRuralFeature = feature;
          selectedRuralLayer = layer;
          destacarRural(layer);
        });

        layer.on("mouseover", () => destacarRural(layer));
        layer.on("mouseout", () => {
          if(selectedRuralLayer !== layer){
            resetarRural(layer);
          }
        });
      }
    }).addTo(map);

    const grupo = L.featureGroup([ruralSigefLayer, ruralCarLayer]);
    if(!ruralLoadedOnce){
      const bounds = grupo.getBounds();
      if(bounds.isValid()){
        map.fitBounds(bounds, { padding:[20,20] });
      }
      ruralLoadedOnce = true;
    }

    ruralStatus.textContent = `${ruralFeatures.length} imóvel(is) rural(is) carregado(s) em ${cidade}/${uf}.`;
    mostrarTudoRural();
  }catch(error){
    console.log("Erro ao carregar rural:", error);
    ruralStatus.textContent = "Erro ao carregar a base rural.";
  }
}

window.mostrarTudoRural = function(){
  if(!ruralFeatures.length){
    ruralResults.innerHTML = `<div class="result-item">Nenhum imóvel rural carregado.</div>`;
    return;
  }

  ruralResults.innerHTML = ruralFeatures.slice(0, 50).map(feature => {
    const props = feature.properties || {};
    const rid = props._rid || "";
    return `
      <div class="result-item" onclick="focarRuralPorId('${rid}')">
        <div class="result-title">${obterNomeRural(props)}</div>
        <div class="result-sub">
          Matrícula / CAR: ${obterMatriculaOuCAR(props)}<br>
          Município: ${obterMunicipioRural(props)}
        </div>
      </div>
    `;
  }).join("");
};

function encontrarLayerPorRid(rid){
  let layerEncontrada = null;

  ruralSigefLayer.eachLayer(layer => {
    if(layer.feature?.properties?._rid === rid){
      layerEncontrada = layer;
    }
  });

  if(!layerEncontrada){
    ruralCarLayer.eachLayer(layer => {
      if(layer.feature?.properties?._rid === rid){
        layerEncontrada = layer;
      }
    });
  }

  return layerEncontrada;
}

window.focarRuralPorId = function(rid){
  const layer = encontrarLayerPorRid(rid);
  if(!layer) return;

  selectedRuralFeature = layer.feature;
  selectedRuralLayer = layer;

  const bounds = layer.getBounds ? layer.getBounds() : null;
  if(bounds && bounds.isValid()){
    map.fitBounds(bounds, { padding:[20,20] });
  }

  layer.openPopup();
  destacarRural(layer);
};

window.buscarRural = function(){
  const termoCar = normalizarTexto(document.getElementById("car").value);
  const termoCcir = normalizarTexto(document.getElementById("ccir").value);
  const termoMatricula = normalizarTexto(document.getElementById("matriculaRural").value);

  if(!ruralFeatures.length){
    ruralResults.innerHTML = `<div class="result-item">A base rural ainda não foi carregada.</div>`;
    return;
  }

  const filtrados = ruralFeatures.filter(feature => {
    const props = feature.properties || {};

    const car = normalizarTexto(props.car || props.cod_imovel || props.cod_immov || "");
    const ccir = normalizarTexto(props.ccir || "");
    const matricula = normalizarTexto(props.matricula || props.registro_m || "");
    const nome = normalizarTexto(obterNomeRural(props));

    const carOk = !termoCar || car.includes(termoCar) || nome.includes(termoCar);
    const ccirOk = !termoCcir || ccir.includes(termoCcir);
    const matriculaOk = !termoMatricula || matricula.includes(termoMatricula);

    return carOk && ccirOk && matriculaOk;
  });

  if(!filtrados.length){
    ruralResults.innerHTML = `<div class="result-item">Nenhum imóvel rural encontrado.</div>`;
    return;
  }

  ruralResults.innerHTML = filtrados.slice(0, 50).map(feature => {
    const props = feature.properties || {};
    const rid = props._rid || "";
    return `
      <div class="result-item" onclick="focarRuralPorId('${rid}')">
        <div class="result-title">${obterNomeRural(props)}</div>
        <div class="result-sub">
          Matrícula / CAR: ${obterMatriculaOuCAR(props)}<br>
          Município: ${obterMunicipioRural(props)}
        </div>
      </div>
    `;
  }).join("");

  if(filtrados.length === 1){
    window.focarRuralPorId(filtrados[0].properties._rid);
  }
};

window.baixarKMLSelecionado = function(){
  if(!selectedRuralFeature){
    alert("Selecione primeiro um imóvel rural no mapa ou na lista.");
    return;
  }

  const nome = obterNomeRural(selectedRuralFeature.properties || {});
  const kml = featureToKml(selectedRuralFeature);
  const arquivo = sanitizarNomeArquivo(nome) + ".kml";
  baixarTextoComoArquivo(kml, arquivo, "application/vnd.google-earth.kml+xml");
};

window.baixarKMLPorId = function(rid){
  const layer = encontrarLayerPorRid(rid);
  if(!layer || !layer.feature){
    alert("Não foi possível gerar o KML deste imóvel.");
    return;
  }

  selectedRuralFeature = layer.feature;
  selectedRuralLayer = layer;
  const nome = obterNomeRural(layer.feature.properties || {});
  const kml = featureToKml(layer.feature);
  const arquivo = sanitizarNomeArquivo(nome) + ".kml";
  baixarTextoComoArquivo(kml, arquivo, "application/vnd.google-earth.kml+xml");
};

window.toggleFullscreen = function(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  }else{
    document.exitFullscreen();
  }
};

window.sair = async function(){
  localStorage.clear();
  try{
    await signOut(auth);
  }catch(e){}
  window.location.href = "index.html";
};

atualizarSelectCidadesRurais();

onAuthStateChanged(auth, async (user) => {
  const ok = await validarAcesso(user);
  if(ok){
    carregarPontos();
    carregarRural();
  }
});
