<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>Matrimap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.min.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.min.js"></script>

<script>

var mapa = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
);

var satelite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
maxZoom:19
}
);

var map = L.map('map',{
center:[-22.19,-47.38],
zoom:11,
layers:[mapa]
});

var baseMaps = {
"Mapa": mapa,
"Satélite": satelite
};


L.control.layers(baseMaps).addTo(map);

var markersLayer = new L.LayerGroup();
map.addLayer(markersLayer);

var url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTch50HxxT3Aq6udssiJ8H5RUrAsINsNQz9zpwKT6j2fS_a_7HwHCx8PnQLBeSc6KeyWkNlRXPRpPEB/pub?output=csv";

fetch(url)

.then(response => response.text())

.then(function(data){

var linhas = data.split("\n");

for(var i=1;i<linhas.length;i++){

var col = linhas[i].split(",");

if(col.length < 13) continue;

function limpar(txt){
if(!txt) return "";
return txt.replace(/"/g,"").trim();
}

var lat = parseFloat(col[1]);
var lng = parseFloat(col[2]);

if(isNaN(lat) || isNaN(lng)) continue;

var estado = limpar(col[3]);
var cidade = limpar(col[4]);
var bairro = limpar(col[5]);
var rua = limpar(col[6]);
var numero = limpar(col[7]);
var quadra = limpar(col[9]);
var lote = limpar(col[10]);
var matricula = limpar(col[11]);

var tituloBusca =
cidade+" "+bairro+" "+rua+" "+numero+" "+matricula+" "+quadra+" "+lote;

var marker = L.marker([lat,lng],{
title: tituloBusca
});

marker.bindPopup(

"<b>Matrícula:</b> "+matricula+
"<br>"+rua+", "+numero+
"<br>"+bairro+
"<br>"+cidade+" - "+estado+
"<br>Quadra: "+quadra+
"<br>Lote: "+lote

);

markersLayer.addLayer(marker);

}

var searchControl = new L.Control.Search({

layer: markersLayer,
propertyName: 'title',
zoom: 17,
initial: false,
marker: false

});

map.addControl(searchControl);

});

</script>

</body>

</html>
