<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matrimap - Mapa</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

<style>
:root{
  --azul:#0b3d91;
  --azul-escuro:#082c68;
  --fundo:#eef3fb;
  --texto:#1f2937;
  --borda:#d9e2f1;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#eef3fb;
  color:var(--texto);
}
.admin-bar{
  position:fixed;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  z-index:99999;
  display:none;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  width:min(96vw, 980px);
  padding:12px;
  background:rgba(255,255,255,.96);
  border:1px solid #d7e5ff;
  border-radius:18px;
  box-shadow:0 18px 40px rgba(0,0,0,.14);
  backdrop-filter:blur(6px);
}
.admin-bar.show{display:flex}
.admin-tag{
  padding:8px 12px;
  border-radius:999px;
  background:#eef4ff;
  color:var(--azul);
  font-size:12px;
  font-weight:700;
}
.admin-nav-btn{
  border:none;
  border-radius:12px;
  padding:10px 12px;
  cursor:pointer;
  font-size:13px;
  font-weight:700;
  background:#eef4ff;
  color:var(--azul);
}
.admin-nav-btn.primary{
  background:var(--azul);
  color:#fff;
}

.app{
  display:grid;
  grid-template-columns:340px 1fr;
  grid-template-rows:70px calc(100vh - 70px);
  grid-template-areas:
    "top top"
    "sidebar map";
}
.topbar{
  grid-area:top;
  background:#fff;
  border-bottom:1px solid #dbe6f8;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}
.brand{
  font-size:28px;
  font-weight:700;
  color:var(--azul);
}
.top-actions{
  display:flex;
  align-items:center;
  gap:12px;
}
.user-badge{
  background:#eef4ff;
  color:var(--azul);
  border:1px solid #d7e5ff;
  padding:10px 14px;
  border-radius:999px;
  font-weight:700;
  font-size:14px;
}
.top-btn{
  border:none;
  padding:10px 14px;
  border-radius:12px;
  cursor:pointer;
  font-weight:700;
  background:var(--azul);
  color:#fff;
}
.top-btn.sec{
  background:#eaf1ff;
  color:var(--azul);
}
.sidebar{
  grid-area:sidebar;
  background:#fff;
  border-right:1px solid #dbe6f8;
  padding:18px;
  overflow:auto;
}
.section{
  border:1px solid #e5edf8;
  border-radius:18px;
  padding:16px;
  margin-bottom:16px;
  background:#fafcff;
}
.section h3{
  margin:0 0 12px;
  font-size:18px;
  color:#0f172a;
}
label{
  display:block;
  font-size:13px;
  font-weight:700;
  color:#344054;
  margin:10px 0 6px;
}
input, select{
  width:100%;
  padding:11px 12px;
  border:1px solid var(--borda);
  border-radius:12px;
  font-size:14px;
  outline:none;
}
input:focus, select:focus{
  border-color:var(--azul);
  box-shadow:0 0 0 4px rgba(11,61,145,.10);
}
.btn{
  width:100%;
  border:none;
  border-radius:12px;
  padding:12px 14px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  margin-top:12px;
}
.btn-primary{
  background:var(--azul);
  color:#fff;
}
.btn-light{
  background:#eef4ff;
  color:var(--azul);
}
#results{
  margin-top:12px;
  max-height:260px;
  overflow:auto;
}
.result-item{
  padding:12px;
  border:1px solid #dde7f6;
  border-radius:12px;
  margin-bottom:8px;
  background:#fff;
  cursor:pointer;
  line-height:1.5;
}
.result-item:hover{border-color:#bcd2ff}
.result-title{
  font-weight:700;
  color:#0f172a;
  margin-bottom:4px;
}
.result-sub{
  font-size:13px;
  color:#64748b;
}
.map-wrap{
  grid-area:map;
  position:relative;
}
#map{
  width:100%;
  height:100%;
}
.footer-contact{
  margin-top:18px;
  font-size:12px;
  line-height:1.8;
  color:#64748b;
}
.legend-note{
  font-size:12px;
  color:#64748b;
  line-height:1.6;
  margin-top:10px;
}
.popup-short{
  min-width:220px;
  line-height:1.6;
}
.popup-short .loc{
  font-weight:700;
  color:#0f172a;
  margin-bottom:6px;
}
.popup-short .sub{
  color:#475569;
  font-size:13px;
}
@media (max-width: 980px){
  .app{
    grid-template-columns:1fr;
    grid-template-rows:70px auto 70vh;
    grid-template-areas:
      "top"
      "sidebar"
      "map";
  }
  .sidebar{border-right:none;border-bottom:1px solid #dbe6f8}
  .admin-bar{
    left:12px;
    right:12px;
    transform:none;
    width:auto;
  }
}
</style>
</head>

<script type="module">

const estadosBrasil = [
  "AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS",
  "MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"

estadosBrasil.forEach(uf => {

function isExpired(vencimento){
  if(!vencimento) return true;
  return new Date(vencimento).getTime() < Date.now();
}

async function validarAcesso(user){
  if(localStorage.getItem("tipoUsuario") === "admin"){
    document.getElementById("userName").textContent = "Administrador";
    return true;
  }

  if(!user){
    window.location.href = "index.html";
    return false;
  }

  const snap = await get(ref(db, "usuarios/" + user.uid));
  if(!snap.exists()){
    window.location.href = "pagamento.html";
    return false;
  }

  const dados = snap.val();
  document.getElementById("userName").textContent = dados.nome || "Usuário";

  const vencimento = dados.vencimento || "";
  const status = dados.status || "pendente_pagamento";

  if(status !== "ativo" || isExpired(vencimento)){
    if(status === "ativo" && isExpired(vencimento)){
      await update(ref(db, "usuarios/" + user.uid), {
        status: "pendente_pagamento"
      });
    }
    window.location.href = "pagamento.html";
    return false;
  }

  return true;
}

const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{ maxZoom:22 });
const streets = L.tileLayer("https://api.maptiler.com/maps/streets/{z}/{x}/{y}.png?key=" + MAPTILER_KEY,{ tileSize:512, zoomOffset:-1, maxZoom:22 });
const hybrid = L.tileLayer("https://api.maptiler.com/maps/hybrid/{z}/{x}/{y}.jpg?key=" + MAPTILER_KEY,{ tileSize:512, zoomOffset:-1, maxZoom:22 });

const map = L.map("map", {
  center:[-22.19,-47.38],
  zoom:13,
  layers:[streets]
});

L.control.layers({
  "Ruas": streets,
  "Satélite": hybrid,
  "Mapa alternativo": osm
}).addTo(map);

let markerLayer = L.layerGroup().addTo(map);
let currentSearchMarker = null;

function limparTexto(v){
  return (v || "").trim();
}

function primeiraValida(...valores){
  return valores.find(v => limparTexto(v));
}

function extrairCidade(address = {}){
  return primeiraValida(address.city, address.town, address.village, address.municipality, address.city_district);
}

function montarEnderecoCurto(address = {}){
  const rua = primeiraValida(address.road, address.pedestrian, address.footway, address.cycleway, address.path, address.residential);
  const bairro = primeiraValida(address.suburb, address.neighbourhood, address.quarter, address.city_district);
  const cidade = extrairCidade(address);

  return {
    rua: rua || "",
    bairro: bairro || "",
    cidade: cidade || ""
  };
}

function textoEnderecoCurto(address = {}){
  const loc = montarEnderecoCurto(address);
  return [loc.rua, loc.bairro, loc.cidade].filter(Boolean).join(", ");
}

function montarHtmlPopupCurto(address = {}, matricula = "", cartorio = "", fallback = ""){
  const loc = montarEnderecoCurto(address);
  const linhaPrincipal = loc.rua || fallback || "Localização encontrada";
  const linhaSecundaria = [loc.bairro, loc.cidade].filter(Boolean).join(" • ");

  return `
    <div class="popup-short">
      <div class="loc">${linhaPrincipal}</div>
      ${linhaSecundaria ? `<div class="sub">${linhaSecundaria}</div>` : ""}
      ${matricula || cartorio ? `<div style="margin-top:8px"><b>Matrícula:</b> ${matricula || "-"}<br><b>Cartório:</b> ${cartorio || "-"}</div>` : ""}
    </div>
  `;
}

function normalizarTexto(s){
  return limparTexto(s)
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase();
}

function extrairLatLngDaCoordenada(coordenada){
  const texto = limparTexto(coordenada);
  if(!texto) return null;

  const partes = texto.split("|");
  if(partes.length !== 2) return null;

  const lat = parseFloat(partes[0].trim().replace(",", "."));
  const lng = parseFloat(partes[1].trim().replace(",", "."));

  if(isNaN(lat) || isNaN(lng)) return null;
  if(Math.abs(lat) > 90 || Math.abs(lng) > 180) return null;

  return { lat, lng };
}

function preencherListaCidades(cidades){
  listaCidades.innerHTML = "";
  cidades.forEach(nome => {
    const option = document.createElement("option");
    option.value = nome;
    listaCidades.appendChild(option);
  });
}

async function carregarCidadesDoEstado(uf){
  cidadeInput.value = "";
  cidadesDoEstado = [];
  preencherListaCidades([]);

  if(!uf) return;

  try{
    const url = `https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`;
    const resposta = await fetch(url);
    const dados = await resposta.json();

    cidadesDoEstado = dados
      .map(item => item.nome)
      .filter(Boolean)
      .sort((a,b) => a.localeCompare(b, "pt-BR"));

    preencherListaCidades(cidadesDoEstado);
  }catch(error){
    console.log("Erro ao carregar cidades:", error);
  }
}

estadoSelect.addEventListener("change", async () => {
  await carregarCidadesDoEstado(estadoSelect.value);
});

cidadeInput.addEventListener("input", () => {
  const termo = normalizarTexto(cidadeInput.value);
  if(!termo){
    preencherListaCidades(cidadesDoEstado);
    return;
  }

  const filtradas = cidadesDoEstado.filter(nome =>
    normalizarTexto(nome).includes(termo)
  );
  preencherListaCidades(filtradas);
});

async function carregarPontos(){
  try{
    markerLayer.clearLayers();

    Papa.parse(CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(resultado){
        const linhas = resultado.data || [];

        linhas.forEach((linha) => {
          const endereco = limparTexto(linha.endereco || linha.Endereco || linha.ENDERECO);
          const matricula = limparTexto(linha.matricula || linha.Matricula || linha.MATRICULA);
          const cartorio = limparTexto(linha.cartorio || linha.Cartorio || linha.CARTORIO);
          const coordenada = limparTexto(linha.coordenada || linha.Coordenada || linha.COORDENADA);

          const posicao = extrairLatLngDaCoordenada(coordenada);
          if(!posicao) return;

          const marker = L.marker([posicao.lat, posicao.lng]).addTo(markerLayer);
          marker.bindPopup(
            montarHtmlPopupCurto(
              { road: endereco },
              matricula,
              cartorio,
              endereco
            )
          );

          if(localStorage.getItem("tipoUsuario") === "admin"){
            const drag = L.marker([posicao.lat, posicao.lng], {draggable:true, opacity:0.01}).addTo(markerLayer);
            drag.on("dragend", function(e){
              console.log("Nova posição:", e.target.getLatLng());
            });
          }
        });
      },
      error: function(error){
        console.log("Erro ao carregar CSV:", error);
      }
    });
  }catch(error){
    console.log("Erro ao carregar CSV:", error);
  }
}

function montarTentativasBusca(){
  const tipo = limparTexto(document.getElementById("tipoLogradouro").value);
  const rua = limparTexto(document.getElementById("rua").value);
  const numero = limparTexto(document.getElementById("numero").value);
  const bairro = limparTexto(document.getElementById("bairro").value);
  const cidade = limparTexto(document.getElementById("cidade").value);
  const estado = limparTexto(document.getElementById("estado").value);

  const tentativas = [];

  if(rua && numero && cidade && estado){
    tentativas.push([tipo, rua, numero, bairro, cidade, estado, "Brasil"].filter(Boolean).join(", "));
  }

  if(rua && cidade && estado){
    tentativas.push([tipo, rua, bairro, cidade, estado, "Brasil"].filter(Boolean).join(", "));
  }

  if(rua && cidade){
    tentativas.push([tipo, rua, bairro, cidade, "Brasil"].filter(Boolean).join(", "));
  }

  if(rua && estado){
    tentativas.push([tipo, rua, bairro, estado, "Brasil"].filter(Boolean).join(", "));
  }

  if(rua){
    tentativas.push([tipo, rua, bairro, "Brasil"].filter(Boolean).join(", "));
    tentativas.push(rua);
  }

  return [...new Set(tentativas)];
}

async function buscarNoNominatim(termo){
  const url = "https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=10&q=" + encodeURIComponent(termo);
  const r = await fetch(url);
  return await r.json();
}

window.buscar = async function(){
  const results = document.getElementById("results");
  results.innerHTML = "";

  const rua = limparTexto(document.getElementById("rua").value);
  if(!rua){
    results.innerHTML = `<div class="result-item">Digite pelo menos parte do nome da rua.</div>`;
    return;
  }

  const tentativas = montarTentativasBusca();
  let data = [];

  for(const termo of tentativas){
    try{
      const resposta = await buscarNoNominatim(termo);
      if(resposta && resposta.length){
        data = resposta;
        break;
      }
    }catch(e){}
  }

  if(!data.length){
    results.innerHTML = `<div class="result-item">Nenhum resultado encontrado. Tente buscar apenas pela rua, ou rua + cidade.</div>`;
    return;
  }

  data.forEach(item => {
    const curto = montarEnderecoCurto(item.address || {});
    const titulo = curto.rua || "Endereço encontrado";
    const subtitulo = [curto.bairro, curto.cidade].filter(Boolean).join(" • ");

    const div = document.createElement("div");
    div.className = "result-item";
    div.innerHTML = `
      <div class="result-title">${titulo}</div>
      <div class="result-sub">${subtitulo || "Sem bairro/cidade informados"}</div>
    `;

    div.onclick = () => {
      const lat = parseFloat(item.lat);
      const lon = parseFloat(item.lon);

      map.setView([lat, lon], 19);

      if(currentSearchMarker){
        map.removeLayer(currentSearchMarker);
      }

      currentSearchMarker = L.marker([lat, lon]).addTo(map);
      currentSearchMarker.bindPopup(montarHtmlPopupCurto(item.address || {}, "", "", titulo)).openPopup();
    };

    results.appendChild(div);
  });
}

window.toggleFullscreen = function(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  }else{
    document.exitFullscreen();
  }
}

window.sair = async function(){
  localStorage.clear();
  try{
    await signOut(auth);
  }catch(e){}
  window.location.href = "index.html";
}

onAuthStateChanged(auth, async (user) => {
  const ok = await validarAcesso(user);
  if(ok) carregarPontos();
});
</script>
