<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Matrimap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;display:flex;}

#sidebar{
width:300px;
background:#0b3d91;
color:white;
padding:15px;
}

#map{
flex:1;
height:100vh;
}

input{
width:100%;
padding:8px;
margin:5px 0;
}

button{
width:100%;
padding:8px;
margin-top:5px;
cursor:pointer;
}
</style>
</head>

<body>

<script>
// BLOQUEIOS
if(!localStorage.getItem("logado")){
alert("Faça login");
window.location.href="index.html";
}

if(localStorage.getItem("tipoUsuario") !== "admin"){
if(localStorage.getItem("pagamento") !== "ok"){
alert("Pagamento necessário");
window.location.href="index.html";
}
}
</script>

<div id="sidebar">

<h3>Busca</h3>

<input id="tipo" placeholder="Tipo (Rua, Av)">
<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="estado" placeholder="Estado">
<input id="cep" placeholder="CEP">

<button onclick="buscar()">Buscar</button>

<hr>

<h4>Legenda</h4>
🔴 Sem matrícula<br>
🟢 Com matrícula<br>
🟡 Não localizada

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// MAPAS
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

var streets = L.tileLayer(
'https://api.maptiler.com/maps/streets/{z}/{x}/{y}.png?key=SUA_KEY',
{tileSize:512,zoomOffset:-1}
);

var hybrid = L.tileLayer(
'https://api.maptiler.com/maps/hybrid/{z}/{x}/{y}.jpg?key=SUA_KEY',
{tileSize:512,zoomOffset:-1}
);

var map = L.map('map',{
center:[-22.19,-47.38],
zoom:13,
layers:[osm]
});

L.control.layers({
"OSM": osm,
"Ruas": streets,
"Híbrido": hybrid
}).addTo(map);

// CSV
fetch("SEU_LINK_CSV")
.then(r=>r.text())
.then(text=>{

let linhas = text.split("\n");

linhas.forEach(async (l,i)=>{

if(i===0) return;

let col = l.split(",");

let endereco = col[0];
let matricula = col[1];
let cartorio = col[2];

let geo = await fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(endereco));
let data = await geo.json();

if(data.length===0) return;

let lat = data[0].lat;
let lon = data[0].lon;

let cor = matricula ? "green" : "red";

L.circleMarker([lat,lon],{
radius:6,
color:cor
}).addTo(map);

});

});

// BUSCA PROFISSIONAL
function buscar(){

let termo =
document.getElementById("tipo").value + " " +
document.getElementById("rua").value + " " +
document.getElementById("bairro").value + " " +
document.getElementById("cidade").value + " " +
document.getElementById("estado").value + " " +
document.getElementById("cep").value;

fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(termo))
.then(r=>r.json())
.then(data=>{

if(data.length==0){
alert("Não encontrado");
return;
}

let lat = data[0].lat;
let lon = data[0].lon;

map.setView([lat,lon],19);

});

}

</script>

</body>
</html>
