<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Matrimap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;}
#map{height:100vh;width:100%;}
#buscaBox{
position:absolute;top:15px;left:50%;
transform:translateX(-50%);
z-index:1000;background:white;padding:10px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
}
#busca{padding:8px;width:280px;border:1px solid #ccc;border-radius:4px;}
button{padding:8px 12px;border:none;border-radius:4px;cursor:pointer;}
#buscarBtn{background:#0b3d91;color:white;}
#limparBtn{background:#777;color:white;margin-left:5px;}
</style>
</head>

<body>

<script>
if(localStorage.getItem("logado")!=="sim"){
alert("Faça login");
window.location.href="index.html";
}
</script>

<div id="buscaBox">
<input id="busca" placeholder="Buscar endereço ou matrícula">
<button id="buscarBtn">Buscar</button>
<button id="limparBtn">Limpar</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var mapa = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:22
});

// 🔥 SATÉLITE COM NOME DE RUAS
var satelite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:22}
);

// nomes por cima
var rotulos = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:22, opacity:0.5}
);

var map = L.map('map',{
center:[-22.19,-47.38],
zoom:13,
layers:[mapa]
});

L.control.layers({
"Mapa": mapa,
"Satélite com nomes": L.layerGroup([satelite, rotulos])
}).addTo(map);

// ================= BUSCA ENDEREÇO =================

document.getElementById("buscarBtn").onclick=function(){

var termo = document.getElementById("busca").value.trim();

if(!termo){ alert("Digite algo"); return; }

fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(termo))
.then(res=>res.json())
.then(function(data){

if(data.length==0){
alert("Não encontrado");
return;
}

var lat = parseFloat(data[0].lat);
var lon = parseFloat(data[0].lon);

map.setView([lat,lon],19);

// popup com matrícula
var chave = lat.toFixed(5)+"_"+lon.toFixed(5);

var marker = L.marker([lat,lon]).addTo(map);

marker.bindPopup(
"<b>"+termo+"</b><br><br>"+
"Matrícula:<br>"+
"<input id='m_"+chave+"'><br><br>"+
"<button onclick='salvar("+lat+","+lon+",\""+termo+"\",\""+chave+"\")'>Salvar</button>"
).openPopup();

});

};

// ================= SALVAR =================

function salvar(lat,lon,endereco,chave){

var valor = document.getElementById("m_"+chave).value;

if(!valor){ alert("Digite a matrícula"); return; }

var dados = JSON.parse(localStorage.getItem("dados")||"[]");

dados.push({
lat:lat,
lon:lon,
endereco:endereco,
matricula:valor
});

localStorage.setItem("dados",JSON.stringify(dados));

alert("Salvo!");

carregarSalvos();
}

// ================= CARREGAR SALVOS =================

function carregarSalvos(){

var dados = JSON.parse(localStorage.getItem("dados")||"[]");

dados.forEach(function(d){

var marker = L.marker([d.lat,d.lon]).addTo(map);

marker.bindPopup(
"<b>Matrícula:</b>"+d.matricula+
"<br>"+d.endereco
);

});

}

carregarSalvos();

// ================= IMÓVEIS AUTOMÁTICOS =================

var camadaOSM = L.layerGroup().addTo(map);

function carregarOSM(){

var b = map.getBounds();

var url = "https://overpass-api.de/api/interpreter?data=[out:json];(way[\"building\"]("+b.getSouth()+","+b.getWest()+","+b.getNorth()+","+b.getEast()+"););out center;";

fetch(url)
.then(r=>r.json())
.then(function(data){

camadaOSM.clearLayers();

data.elements.forEach(function(e){

if(!e.center) return;

L.circleMarker([e.center.lat,e.center.lon],{
radius:4,color:"red",fillOpacity:0.5
}).addTo(camadaOSM);

});

});

}

carregarOSM();
map.on("moveend",carregarOSM);

</script>

</body>
</html>
