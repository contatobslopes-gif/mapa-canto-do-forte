<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>Matrimap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
width:100%;
}

#buscaBox{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
z-index:1000;
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.3);
}

#busca{
padding:8px;
width:280px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:8px 12px;
border:none;
border-radius:4px;
cursor:pointer;
}

#buscarBtn{
background:#0b3d91;
color:white;
}

#limparBtn{
background:#777;
color:white;
margin-left:5px;
}

</style>

</head>

<body>

<div id="buscaBox">

<input id="busca" placeholder="Buscar cidade, rua, bairro, matrícula">

<button id="buscarBtn" onclick="buscar()">Buscar</button>

<button id="limparBtn" onclick="limpar()">Limpar</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-22.19,-47.38],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTch50HxxT3Aq6udssiJ8H5RUrAsINsNQz9zpwKT6j2fS_a_7HwHCx8PnQLBeSc6KeyWkNlRXPRpPEB/pub?output=csv";

var imoveis = [];

fetch(url)

.then(response => response.text())

.then(function(data){

var linhas = data.split("\n");

for(var i=1;i<linhas.length;i++){

var col = linhas[i].split(",");

var lat = parseFloat(col[1]);
var lng = parseFloat(col[2]);

if(!isNaN(lat) && !isNaN(lng)){

var estado = col[3];
var cidade = col[4];
var bairro = col[5];
var rua = col[6];
var numero = col[7];
var complemento = col[8];
var quadra = col[9];
var lote = col[10];
var matricula = col[11];
var cartorio = col[12];

var marker = L.marker([lat,lng]).addTo(map)

.bindPopup(

"<b>Matrícula:</b> "+matricula+
"<br>"+rua+", "+numero+
"<br>"+bairro+
"<br>"+cidade+" - "+estado+
"<br>Quadra: "+quadra+
"<br>Lote: "+lote

);

imoveis.push({

cidade:cidade,
bairro:bairro,
rua:rua,
numero:numero,
matricula:matricula,
quadra:quadra,
lote:lote,
marker:marker

});

}

}

});

function buscar(){

var termo = document.getElementById("busca").value.toLowerCase();

imoveis.forEach(function(i){

var texto =
(i.cidade + i.bairro + i.rua + i.numero + i.matricula + i.quadra + i.lote).toLowerCase();

if(texto.includes(termo)){

i.marker.addTo(map);

}else{

map.removeLayer(i.marker);

}

});

}

function limpar(){

document.getElementById("busca").value="";

imoveis.forEach(function(i){

i.marker.addTo(map);

});

}

</script>

</body>

</html>
