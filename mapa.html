<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Matrimap</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      display:flex;
      height:100vh;
      overflow:hidden;
      background:#f5f7fb;
    }

    #sidebar{
      width:340px;
      background:#0b3d91;
      color:white;
      padding:20px;
      overflow-y:auto;
      box-shadow:2px 0 10px rgba(0,0,0,0.15);
      z-index:1000;
    }

    #sidebar h1{
      margin-top:0;
      font-size:28px;
      margin-bottom:8px;
    }

    #sidebar p{
      font-size:14px;
      line-height:1.4;
      margin-bottom:18px;
      color:#dfe9ff;
    }

    .bloco{
      margin-bottom:18px;
      background:rgba(255,255,255,0.08);
      padding:14px;
      border-radius:10px;
    }

    .bloco h2{
      font-size:16px;
      margin:0 0 10px 0;
      color:#fff;
    }

    input, select, button{
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border:none;
      border-radius:8px;
      font-size:14px;
    }

    input, select{
      background:white;
      color:#222;
    }

    button{
      background:#ffffff;
      color:#0b3d91;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      transform:scale(1.01);
      opacity:0.96;
    }

    .botao-secundario{
      background:#dfe9ff;
    }

    .legenda-item{
      display:flex;
      align-items:center;
      margin-bottom:8px;
      font-size:14px;
    }

    .cor{
      width:16px;
      height:16px;
      border-radius:50%;
      margin-right:8px;
      border:1px solid rgba(255,255,255,0.5);
      flex-shrink:0;
    }

    #map{
      flex:1;
      height:100vh;
    }

    .info-status{
      font-size:13px;
      color:#dfe9ff;
      margin-top:5px;
      line-height:1.4;
    }

    .resultado-busca{
      background:white;
      color:#222;
      border-radius:8px;
      padding:10px;
      margin-top:8px;
      font-size:13px;
      max-height:180px;
      overflow-y:auto;
    }

    .resultado-item{
      padding:8px;
      border-bottom:1px solid #ddd;
      cursor:pointer;
    }

    .resultado-item:last-child{
      border-bottom:none;
    }

    .resultado-item:hover{
      background:#f1f5ff;
    }

    .leaflet-popup-content{
      font-size:14px;
      line-height:1.5;
    }

    .popup-endereco{
      font-weight:bold;
      color:#0b3d91;
      margin-bottom:8px;
    }

    .topo-mapa{
      position:absolute;
      top:15px;
      left:50%;
      transform:translateX(-50%);
      z-index:1001;
      background:white;
      padding:8px;
      border-radius:12px;
      box-shadow:0 4px 16px rgba(0,0,0,0.15);
      width:min(500px, calc(100% - 30px));
    }

    .topo-mapa input{
      margin:0;
      border:1px solid #d9d9d9;
    }

    @media (max-width: 900px){
      body{
        flex-direction:column;
      }

      #sidebar{
        width:100%;
        height:320px;
      }

      #map{
        height:calc(100vh - 320px);
      }
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <h1>MATRIMAP</h1>
    <p>Buscando o número da matrícula imobiliária? Solução ágil em segundos.</p>

    <div class="bloco">
      <h2>Buscar imóvel</h2>

      <select id="tipoBusca">
        <option value="endereco">Buscar por endereço</option>
        <option value="matricula">Buscar por matrícula</option>
        <option value="cartorio">Buscar por cartório</option>
      </select>

      <input type="text" id="campoBusca" placeholder="Digite aqui...">

      <button onclick="buscarImoveis()">Buscar</button>
      <button class="botao-secundario" onclick="limparBusca()">Limpar busca</button>

      <div id="resultadoBusca" class="resultado-busca" style="display:none;"></div>
    </div>

    <div class="bloco">
      <h2>Legenda</h2>

      <div class="legenda-item">
        <div class="cor" style="background:#16a34a;"></div>
        <span>Com matrícula</span>
      </div>

      <div class="legenda-item">
        <div class="cor" style="background:#dc2626;"></div>
        <span>Sem matrícula</span>
      </div>

      <div class="legenda-item">
        <div class="cor" style="background:#eab308;"></div>
        <span>Informação incompleta</span>
      </div>
    </div>

    <div class="bloco">
      <h2>Status</h2>
      <div id="status" class="info-status">Carregando dados...</div>
    </div>

    <div class="bloco">
      <h2>Ações</h2>
      <button onclick="centralizarMapa()">Centralizar mapa</button>
      <button class="botao-secundario" onclick="recarregarDados()">Recarregar dados</button>
      <button class="botao-secundario" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="topo-mapa">
    <input type="text" id="buscaRapidaMapa" placeholder="Busca rápida no mapa..." onkeyup="buscarRapidaMapa(event)">
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    /******************************************************************
     * 1) CONFIGURAÇÃO
     * TROQUE APENAS A URL ABAIXO PELA SUA PLANILHA PUBLICADA EM CSV
     ******************************************************************/
    const CSV_URL = "COLE_AQUI_O_LINK_CSV_DA_SUA_PLANILHA";

    /******************************************************************
     * 2) PROTEÇÃO MODO TESTE
     * Mantido em localStorage como você pediu
     ******************************************************************/
    const usuarioLogado = localStorage.getItem("usuarioLogado");
    const tipoUsuario = localStorage.getItem("tipoUsuario");
    const pagamento = localStorage.getItem("pagamento");

    if (!usuarioLogado) {
      alert("Você precisa estar logado para acessar o mapa.");
      window.location.href = "index.html";
    }

    if (tipoUsuario !== "admin" && pagamento !== "aprovado") {
      alert("Seu acesso ao mapa está bloqueado até a confirmação do pagamento.");
      window.location.href = "index.html";
    }

    /******************************************************************
     * 3) MAPA
     ******************************************************************/
    const map = L.map("map").setView([-22.1856, -47.3842], 13);

    const camadaOSM = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 22,
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    const camadaSatelite = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
      maxZoom: 22,
      attribution: "Tiles &copy; Esri"
    });

    const baseMaps = {
      "Mapa": camadaOSM,
      "Satélite": camadaSatelite
    };

    L.control.layers(baseMaps, null, { collapsed: true }).addTo(map);

    let markersLayer = L.layerGroup().addTo(map);
    let todosImoveis = [];
    let todosMarkers = [];
    let boundsGerais = [];

    /******************************************************************
     * 4) FUNÇÕES DE TRATAMENTO
     ******************************************************************/
    function limparTexto(valor) {
      if (valor === null || valor === undefined) return "";
      return String(valor).trim();
    }

    function normalizarTexto(valor) {
      return limparTexto(valor)
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
    }

    function extrairLatLng(coordenadaOriginal) {
      if (!coordenadaOriginal) return null;

      let texto = String(coordenadaOriginal).trim();

      texto = texto.replace(/\s+/g, " ");

      const numeros = texto.match(/-?\d+(?:[.,]\d+)?/g);
      if (!numeros || numeros.length < 2) return null;

      let n1 = numeros[0].replace(",", ".");
      let n2 = numeros[1].replace(",", ".");

      let lat = parseFloat(n1);
      let lng = parseFloat(n2);

      if (isNaN(lat) || isNaN(lng)) return null;

      if (Math.abs(lat) > 90 || Math.abs(lng) > 180) {
        return null;
      }

      return { lat, lng };
    }

    function definirCorMarcador(imovel) {
      const matricula = limparTexto(imovel.matricula);
      const endereco = limparTexto(imovel.endereco);
      const cartorio = limparTexto(imovel.cartorio);

      if (matricula && endereco && cartorio) return "#16a34a";
      if (!matricula) return "#dc2626";
      return "#eab308";
    }

    function criarIcone(cor) {
      return L.divIcon({
        className: "",
        html: `
          <div style="
            width:18px;
            height:18px;
            background:${cor};
            border:2px solid white;
            border-radius:50%;
            box-shadow:0 0 6px rgba(0,0,0,0.4);
          "></div>
        `,
        iconSize: [18, 18],
        iconAnchor: [9, 9],
        popupAnchor: [0, -9]
      });
    }

    function montarPopup(imovel) {
      return `
        <div class="popup-endereco">${imovel.endereco || "Endereço não informado"}</div>
        <div><strong>Matrícula:</strong> ${imovel.matricula || "Não informada"}</div>
        <div><strong>Cartório:</strong> ${imovel.cartorio || "Não informado"}</div>
        <div><strong>Coordenada:</strong> ${imovel.coordenada || "Não informada"}</div>
      `;
    }

    /******************************************************************
     * 5) CARREGAMENTO DA PLANILHA
     * COLUNAS ESPERADAS:
     * ENDERECO | MATRICULA | CARTORIO | COORDENADA
     ******************************************************************/
    function carregarDados() {
      document.getElementById("status").innerHTML = "Carregando dados da planilha...";
      markersLayer.clearLayers();
      todosImoveis = [];
      todosMarkers = [];
      boundsGerais = [];

      Papa.parse(CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(resultado) {
          const linhas = resultado.data;

          if (!linhas || linhas.length === 0) {
            document.getElementById("status").innerHTML = "Nenhum dado encontrado na planilha.";
            return;
          }

          let totalLidos = 0;
          let totalValidos = 0;
          let totalInvalidos = 0;

          linhas.forEach((linha, index) => {
            totalLidos++;

            const endereco = limparTexto(linha.ENDERECO || linha.Endereco || linha.endereco);
            const matricula = limparTexto(linha.MATRICULA || linha.Matricula || linha.matricula);
            const cartorio = limparTexto(linha.CARTORIO || linha.Cartorio || linha.cartorio);
            const coordenada = limparTexto(linha.COORDENADA || linha.Coordenada || linha.coordenada);

            const latLng = extrairLatLng(coordenada);

            if (!latLng) {
              totalInvalidos++;
              return;
            }

            const imovel = {
              id: index + 1,
              endereco,
              matricula,
              cartorio,
              coordenada,
              lat: latLng.lat,
              lng: latLng.lng
            };

            todosImoveis.push(imovel);

            const cor = definirCorMarcador(imovel);
            const marker = L.marker([imovel.lat, imovel.lng], {
              icon: criarIcone(cor)
            }).bindPopup(montarPopup(imovel));

            marker.imovelData = imovel;

            marker.addTo(markersLayer);
            todosMarkers.push(marker);
            boundsGerais.push([imovel.lat, imovel.lng]);

            totalValidos++;
          });

          if (boundsGerais.length > 0) {
            map.fitBounds(boundsGerais, { padding: [30, 30] });
          }

          document.getElementById("status").innerHTML =
            "Total lido: " + totalLidos +
            "<br>Válidos no mapa: " + totalValidos +
            "<br>Ignorados por coordenada inválida: " + totalInvalidos;
        },
        error: function(erro) {
          document.getElementById("status").innerHTML = "Erro ao carregar a planilha.";
          console.error("Erro ao carregar CSV:", erro);
        }
      });
    }

    /******************************************************************
     * 6) BUSCA
     ******************************************************************/
    function exibirResultados(lista) {
      const box = document.getElementById("resultadoBusca");

      if (!lista.length) {
        box.style.display = "block";
        box.innerHTML = "Nenhum imóvel encontrado.";
        return;
      }

      box.style.display = "block";
      box.innerHTML = "";

      lista.forEach(item => {
        const div = document.createElement("div");
        div.className = "resultado-item";
        div.innerHTML = `
          <strong>${item.endereco || "Endereço não informado"}</strong><br>
          Matrícula: ${item.matricula || "Não informada"}<br>
          Cartório: ${item.cartorio || "Não informado"}
        `;

        div.onclick = function() {
          map.setView([item.lat, item.lng], 18);

          const markerEncontrado = todosMarkers.find(m =>
            m.imovelData.id === item.id
          );

          if (markerEncontrado) {
            markerEncontrado.openPopup();
          }
        };

        box.appendChild(div);
      });
    }

    function buscarImoveis() {
      const tipo = document.getElementById("tipoBusca").value;
      const valor = normalizarTexto(document.getElementById("campoBusca").value);

      if (!valor) {
        alert("Digite algo para buscar.");
        return;
      }

      let encontrados = [];

      if (tipo === "endereco") {
        encontrados = todosImoveis.filter(item =>
          normalizarTexto(item.endereco).includes(valor)
        );
      } else if (tipo === "matricula") {
        encontrados = todosImoveis.filter(item =>
          normalizarTexto(item.matricula).includes(valor)
        );
      } else if (tipo === "cartorio") {
        encontrados = todosImoveis.filter(item =>
          normalizarTexto(item.cartorio).includes(valor)
        );
      }

      exibirResultados(encontrados);
    }

    function buscarRapidaMapa(event) {
      if (event.key !== "Enter") return;

      const valor = normalizarTexto(document.getElementById("buscaRapidaMapa").value);

      if (!valor) return;

      const encontrados = todosImoveis.filter(item =>
        normalizarTexto(item.endereco).includes(valor) ||
        normalizarTexto(item.matricula).includes(valor) ||
        normalizarTexto(item.cartorio).includes(valor)
      );

      exibirResultados(encontrados);

      if (encontrados.length === 1) {
        map.setView([encontrados[0].lat, encontrados[0].lng], 18);

        const markerEncontrado = todosMarkers.find(m =>
          m.imovelData.id === encontrados[0].id
        );

        if (markerEncontrado) {
          markerEncontrado.openPopup();
        }
      }
    }

    function limparBusca() {
      document.getElementById("campoBusca").value = "";
      document.getElementById("buscaRapidaMapa").value = "";
      document.getElementById("resultadoBusca").style.display = "none";
      document.getElementById("resultadoBusca").innerHTML = "";

      if (boundsGerais.length > 0) {
        map.fitBounds(boundsGerais, { padding: [30, 30] });
      }
    }

    /******************************************************************
     * 7) AÇÕES
     ******************************************************************/
    function centralizarMapa() {
      if (boundsGerais.length > 0) {
        map.fitBounds(boundsGerais, { padding: [30, 30] });
      }
    }

    function recarregarDados() {
      carregarDados();
    }

    function logout() {
      localStorage.removeItem("usuarioLogado");
      localStorage.removeItem("tipoUsuario");
      localStorage.removeItem("pagamento");
      window.location.href = "index.html";
    }

    /******************************************************************
     * 8) INICIAR
     ******************************************************************/
    carregarDados();
  </script>
</body>
</html>
