<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Matrimap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
margin:0;
}

#map{
height:100vh;
width:100%;
}

</style>

</head>

<body>

<div id="map"></div>

<script>

var map = L.map('map').setView([-22.19,-47.38],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTch50HxxT3Aq6udssiJ8H5RUrAsINsNQz9zpwKT6j2fS_a_7HwHCx8PnQLBeSc6KeyWkNlRXPRpPEB/pub?output=csv";

Papa.parse(sheetURL, {

download:true,
header:true,

complete:function(results){

results.data.forEach(function(row){

var lat = parseFloat(row.lat);
var lng = parseFloat(row.lng);

if(!isNaN(lat) && !isNaN(lng)){

L.marker([lat,lng])
.addTo(map)
.bindPopup(

"<b>"+row.cidade+"</b><br>"+
row.rua+" "+row.numero

);

}

});

}

});

</script>

</body>
</html>
