<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Matrimap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
}

#map{
height:100vh;
width:100%;
}

</style>

</head>

<body>

<div id="map"></div>

<script>

// criar mapa
var map = L.map('map').setView([-23.55,-46.63],10);

// camada do mapa
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

// link da planilha
var sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTch50HxxT3Aq6udssiJ8H5RUrAsINsNQz9zpwKT6j2fS_a_7HwHCx8PnQLBeSc6KeyWkNlRXPRpPEB/pub?output=csv";

fetch(sheetURL)
.then(response => response.text())
.then(data => {

var linhas = data.split("\n");

for(var i=1;i<linhas.length;i++){

var colunas = linhas[i].split(",");

var lat = colunas[1];
var lng = colunas[2];
var cidade = colunas[4];
var rua = colunas[6];
var matricula = colunas[11];

if(lat && lng){

L.marker([lat,lng])
.addTo(map)
.bindPopup(
"<b>Matrícula:</b> "+matricula+
"<br><b>Rua:</b> "+rua+
"<br><b>Cidade:</b> "+cidade
);

}

}

});

</script>

</body>
</html>
