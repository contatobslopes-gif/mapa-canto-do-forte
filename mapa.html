<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Matrimap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;display:flex;}

#sidebar{
width:300px;
background:#0b3d91;
color:white;
padding:15px;
}

#map{
flex:1;
height:100vh;
}

input{
width:100%;
padding:8px;
margin:5px 0;
}

button{
width:100%;
padding:8px;
margin-top:5px;
cursor:pointer;
}
</style>
</head>

<body>

<script>
// BLOQUEIOS
if(!localStorage.getItem("logado")){
alert("Faça login");
window.location.href="index.html";
}

if(localStorage.getItem("tipoUsuario") !== "admin"){
if(localStorage.getItem("pagamento") !== "ok"){
alert("Pagamento necessário");
window.location.href="index.html";
}
}
</script>

<div id="sidebar">

<h3>Busca</h3>

<input id="tipo" placeholder="Tipo (Rua, Av)">
<input id="rua" placeholder="Rua">
<input id="bairro" placeholder="Bairro">
<input id="cidade" placeholder="Cidade">
<input id="estado" placeholder="Estado">
<input id="cep" placeholder="CEP">

<button onclick="buscar()">Buscar</button>

<hr>

<h4>Legenda</h4>
🔴 Sem matrícula<br>
🟢 Com matrícula<br>
🟡 Não localizada

</div>

<div id="map"></div>

<!-- 🔥 AQUI ESTAVA FALTANDO -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// CONFIG
const MAPTILER_KEY = "uu87SbOErvr1cRzcFL7E";

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTch50HxxT3Aq6udssiJ8H5RUrAsINsNQz9zpwKT6j2fS_a_7HwHCx8PnQLBeSc6KeyWkNlRXPRpPEB/pub?output=csv";


// MAPAS
var osm = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{ maxZoom:22 }
);

var streets = L.tileLayer(
'https://api.maptiler.com/maps/streets/{z}/{x}/{y}.png?key=' + MAPTILER_KEY,
{ tileSize:512, zoomOffset:-1, maxZoom:22 }
);

var hybrid = L.tileLayer(
'https://api.maptiler.com/maps/hybrid/{z}/{x}/{y}.jpg?key=' + MAPTILER_KEY,
{ tileSize:512, zoomOffset:-1, maxZoom:22 }
);


// MAPA
var map = L.map('map',{
center:[-22.19,-47.38],
zoom:13,
layers:[osm]
});


// CONTROLE
L.control.layers({
"OSM": osm,
"Ruas (MapTiler)": streets,
"Híbrido": hybrid
}).addTo(map);


// 🔥 CARREGAMENTO MAIS SEGURO (não trava o mapa)
fetch(CSV_URL)
.then(r=>r.text())
.then(text=>{

let linhas = text.split("\n");

// processa aos poucos (evita travar)
let i = 1;

function processarLinha(){

if(i >= linhas.length) return;

let col = linhas[i].split(",");

let endereco = col[0];
let matricula = col[1];
let cartorio = col[2];

i++;

if(!endereco){
setTimeout(processarLinha,50);
return;
}

fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(endereco))
.then(r=>r.json())
.then(data=>{

if(data.length > 0){

let lat = parseFloat(data[0].lat);
let lon = parseFloat(data[0].lon);

let cor = "red";
if(matricula && matricula.trim() !== "") cor = "green";

let marker = L.circleMarker([lat,lon],{
radius:6,
color:cor,
fillOpacity:0.8
}).addTo(map);

marker.bindPopup(
"<b>"+endereco+"</b><br>"+
"Matrícula: "+matricula+"<br>"+
"Cartório: "+cartorio
);

// ADMIN DRAG
if(localStorage.getItem("tipoUsuario")==="admin"){
let drag = L.marker([lat,lon],{draggable:true}).addTo(map);

drag.on("dragend",function(e){
console.log("Nova posição:", e.target.getLatLng());
});
}

}

setTimeout(processarLinha,100);

});

}

processarLinha();

});


// BUSCA (mantida)
function buscar(){

let termo =
document.getElementById("tipo").value + " " +
document.getElementById("rua").value + " " +
document.getElementById("bairro").value + " " +
document.getElementById("cidade").value + " " +
document.getElementById("estado").value + " " +
document.getElementById("cep").value;

fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(termo))
.then(r=>r.json())
.then(data=>{

if(data.length==0){
alert("Não encontrado");
return;
}

map.setView([data[0].lat,data[0].lon],19);

});

}

</script>

</body>
</html>
