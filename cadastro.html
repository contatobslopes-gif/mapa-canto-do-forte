<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyC-H3jvvvtlv4g3iuP7rVgr5K-R8YSjMYo",
authDomain: "matrimap-899b3.firebaseapp.com",
projectId: "matrimap-899b3",
storageBucket: "matrimap-899b3.firebasestorage.app",
messagingSenderId: "1094066148423",
appId: "1:1094066148423:web:260b14f4e2259681554d62",
databaseURL: "https://matrimap-899b3-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

window.criarConta = function(){

var nome = document.getElementById("nome").value;
var cpf = document.getElementById("cpf").value;
var cidade = document.getElementById("cidade").value;
var email = document.getElementById("email").value;
var senha = document.getElementById("senha").value;

createUserWithEmailAndPassword(auth, email, senha)
.then((userCredential) => {

var user = userCredential.user;

set(ref(db, "usuarios/" + user.uid), {
nome: nome,
cpf: cpf,
cidade: cidade,
email: email
});

alert("Conta criada com sucesso!");

window.location.href="index.html";

})
.catch((error) => {

alert(error.message);

});

}

window.mostrarSenha = function(){

var campo = document.getElementById("senha");

if(campo.type === "password"){
campo.type = "text";
}else{
campo.type = "password";
}

}

</script>
