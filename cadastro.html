
<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Matrimap - Cadastro</title>

<style>

body{
font-family:Arial;
background:#0b3d91;
color:white;
text-align:center;
padding-top:150px;
}

input{
padding:10px;
margin:10px;
width:250px;
border:none;
border-radius:4px;
}

button{
padding:10px 20px;
border:none;
border-radius:4px;
background:white;
color:#0b3d91;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<img src="bemvindo.png" style="width:450px;"><br>

<h1>Criar Conta</h1>

<input id="nome" placeholder="Nome completo"><br>

<input id="cpf" placeholder="CPF"><br>

<input id="cidade" placeholder="Cidade"><br>

<input id="email" placeholder="Email"><br>

<input id="senha" type="password" placeholder="Senha"><br>

<label>
<input type="checkbox" onclick="mostrarSenha()"> Mostrar senha
</label>

<br><br>

<button onclick="criarConta()">Cadastrar</button>

<br><br>

<a href="index.html">
<button>Voltar para login</button>
</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import { getAuth, createUserWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import { getDatabase, ref, set }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyC-H3jvvvtlv4g3iuP7rVgr5K-R8YSjMYo",
authDomain: "matrimap-899b3.firebaseapp.com",
projectId: "matrimap-899b3",
storageBucket: "matrimap-899b3.firebasestorage.app",
messagingSenderId: "1094066148423",
appId: "1:1094066148423:web:260b14f4e2259681554d62",
databaseURL: "https://matrimap-899b3-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

window.criarConta = function(){

var nome = document.getElementById("nome").value;
var cpf = document.getElementById("cpf").value;
var cidade = document.getElementById("cidade").value;
var email = document.getElementById("email").value;
var senha = document.getElementById("senha").value;

createUserWithEmailAndPassword(auth, email, senha)
.then((userCredential) => {

var user = userCredential.user;

set(ref(db, "usuarios/" + user.uid), {
nome: nome,
cpf: cpf,
cidade: cidade,
email: email
});

alert("Conta criada com sucesso!");

window.location.href="index.html";

})
.catch((error) => {

alert(error.message);

});

}

window.mostrarSenha = function(){

var campo = document.getElementById("senha");

if(campo.type === "password"){
campo.type = "text";
}else{
campo.type = "password";
}

}

</script>

</body>
</html>
